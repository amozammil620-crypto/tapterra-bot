<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Terra Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0c29; color: white; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        .score-container { font-size: 45px; font-weight: bold; color: #f1c40f; margin-top: 20px; }
        .bottle-container { width: 150px; height: 35px; background: #222; border: 3px solid #00d2ff; border-radius: 20px; margin: 20px auto; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: #00d2ff; transition: width 0.3s; }
        #coin-btn { width: 200px; height: 200px; background: gold; border-radius: 50%; border: 8px solid #b8860b; margin: 40px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; color: black; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); user-select: none; }
        #coin-btn:active { transform: scale(0.95); }
        .recharge-btn { display: none; background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        #timer-box { display: none; font-size: 20px; color: #ff9f43; margin-top: 20px; }
        #loading-text { font-size: 18px; color: #aaa; }
    </style>
</head>
<body>

    <div id="loading-text">Syncing with Firebase...</div>
    <div class="score-container">💰 <span id="coin-count">0</span></div>
    
    <div class="bottle-container">
        <div id="energy-fill"></div>
    </div>
    <div style="color:#00d2ff">⚡ Energy: <span id="energy-val">10</span>/10</div>

    <div id="coin-btn" onclick="handleTap(event)">TAP</div>

    <button id="recharge-btn" class="recharge-btn" onclick="startRecharge()">⚡ RECHARGE</button>
    <div id="timer-box">Refilling: <span id="seconds">20</span>s</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVfY7eeafTsMuNqGEnf-_-dIeACif3yRI",
            authDomain: "tapsterratry-ec73f.firebaseapp.com",
            databaseURL: "https://tapsterratry-ec73f-default-rtdb.firebaseio.com",
            projectId: "tapsterratry-ec73f",
            storageBucket: "tapsterratry-ec73f.firebasestorage.app",
            messagingSenderId: "845980784275",
            appId: "1:845980784275:web:7b50d4264927333a505f66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || "dev_user";
        const userRef = db.ref('players/' + userId);

        let coins = 0;
        let energy = 10;
        let isRecharging = false;
        let isLoaded = false; // Naya check

        // Firebase se Live Update lena
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                coins = data.coins || 0;
                energy = (data.energy !== undefined) ? data.energy : 10;
                
                document.getElementById('coin-count').innerText = coins;
                document.getElementById('energy-val').innerText = energy;
                document.getElementById('energy-fill').style.width = (energy * 10) + "%";

                if (data.rechargeFinishTime) {
                    const now = Date.now();
                    if (now < data.rechargeFinishTime) {
                        showTimer(data.rechargeFinishTime);
                    } else if (energy === 0) {
                        finishRecharge();
                    }
                }
            }
            isLoaded = true; // Data mil gaya
            document.getElementById('loading-text').style.display = "none";
            updateUI();
        });

        function handleTap(e) {
            if (!isLoaded) return; // Jab tak data na aaye, tap mat hone do
            
            if (energy > 0 && !isRecharging) {
                const newCoins = coins + 5;
                const newEnergy = energy - 1;
                // Seedhe update karo, local variable par bharosa mat karo
                userRef.update({ coins: newCoins, energy: newEnergy });
            }
        }

        function updateUI() {
            const btn = document.getElementById('coin-btn');
            const rchg = document.getElementById('recharge-btn');

            if (energy === 0 && !isRecharging) {
                btn.style.display = "none";
                rchg.style.display = "inline-block";
            } else if (isRecharging) {
                btn.style.display = "none";
                rchg.style.display = "none";
            } else {
                btn.style.display = "flex";
                rchg.style.display = "none";
            }
        }

        function startRecharge() {
            const finishTime = Date.now() + 20000;
            userRef.update({ rechargeFinishTime: finishTime });
        }

        function showTimer(finishTime) {
            isRecharging = true;
            document.getElementById('timer-box').style.display = "block";
            
            const timerCheck = setInterval(() => {
                const now = Date.now();
                const timeLeft = Math.ceil((finishTime - now) / 1000);

                if (timeLeft <= 0) {
                    clearInterval(timerCheck);
                    finishRecharge();
                } else {
                    document.getElementById('seconds').innerText = timeLeft;
                }
            }, 1000);
        }

        function finishRecharge() {
            isRecharging = false;
            document.getElementById('timer-box').style.display = "none";
            userRef.update({ energy: 10, rechargeFinishTime: null });
        }
    </script>
</body>
</html>
