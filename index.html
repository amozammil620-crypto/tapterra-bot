<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Tap Pro Earning</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f0c29; background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29); color: white; text-align: center; touch-action: manipulation; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Coin Style */
        #coin { 
            width: 200px; height: 200px; background: radial-gradient(circle, #f1c40f, #f39c12); 
            border-radius: 50%; border: 8px solid #d35400; display: flex; align-items: center; 
            justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer;
            margin: 30px auto; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent;
        }
        #coin:active { transform: scale(0.95); }
        
        .pts-text { font-size: 32px; font-weight: bold; color: #f1c40f; }
        .floating-pts { position: absolute; color: #2ecc71; font-weight: bold; font-size: 24px; pointer-events: none; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        /* UI Elements */
        .btn { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; width: 85%; margin: 10px 0; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; margin: 10px 0; font-size: 16px; color: #333; }
        .history-box { width: 90%; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1 style="margin-top: 60px;">TapsTerra Earning</h1>
        <p>Tap karke paise kamao!</p>
        <button class="btn" onclick="nav('game-screen')">Start Play</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="pts-text">💰 <span class="coin-val">0</span></div>
        <p>Taps Left: <span id="taps">100</span>/100</p>
        <div id="coin" onclick="handleTap(event)">TAP ME</div>
        <button class="btn" style="background:#2980b9" onclick="nav('redeem-screen')">Wallet</button>
    </div>

    <div id="redeem-screen" class="screen" style="background: #f1c40f; color: #333;">
        <h2>Your Wallet</h2>
        <div style="font-size: 40px; font-weight: bold;"><span class="coin-val">0</span> Pts</div>
        <div style="font-size: 20px; color: #27ae60;">≈ ₹<span id="rs-val">0.00</span></div>
        
        <input type="text" id="upi-id" placeholder="Enter UPI ID (e.g. name@upi)">
        <button class="btn" style="background:#2c3e50" onclick="handleWithdraw()">Withdraw Now</button>
        
        <div class="history-box" style="color: #fff; background: #2c3e50;">
            <h4>Recent History</h4>
            <div id="history-list">No history found</div>
        </div>
        <p onclick="nav('game-screen')" style="cursor:pointer; text-decoration: underline;">Back to Game</p>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAVfY7eeafTsMuNqGEnf-_-dIeACif3yRI",
            authDomain: "tapsterratry-ec73f.firebaseapp.com",
            databaseURL: "https://tapsterratry-ec73f-default-rtdb.firebaseio.com",
            projectId: "tapsterratry-ec73f",
            storageBucket: "tapsterratry-ec73f.firebasestorage.app",
            messagingSenderId: "845980784275",
            appId: "1:845980784275:web:7b50d4264927333a505f66"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // USER SYNC
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || "test_user_1";
        const userRef = db.ref('players/' + userId);

        let pts = 0;
        let left = 100;

        // FETCH DATA (RESET PREVENT)
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                pts = data.coins || 0;
                left = data.tapsRemaining !== undefined ? data.tapsRemaining : 100;
                updateUI();
                if (data.withdrawals) renderHistory(data.withdrawals);
            }
        });

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleTap(e) {
            if (left > 0) {
                pts += 5;
                left--;
                userRef.update({ coins: pts, tapsRemaining: left });
                showAnim(e.clientX, e.clientY);
            } else {
                alert("Aaj ki limit khatam!");
            }
        }

        function updateUI() {
            document.querySelectorAll('.coin-val').forEach(el => el.innerText = pts);
            document.getElementById('taps').innerText = left;
            document.getElementById('rs-val').innerText = (pts / 500).toFixed(2);
        }

        function showAnim(x, y) {
            const d = document.createElement('div');
            d.className = 'floating-pts';
            d.innerText = '+5';
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
        }

        function handleWithdraw() {
            const upi = document.getElementById('upi-id').value;
            if (pts < 500) { alert("Min 500 points chahiye!"); return; }
            if (!upi.includes('@')) { alert("UPI ID galat hai!"); return; }

            userRef.child('withdrawals').push({
                amount: (pts/500).toFixed(2),
                date: new Date().toLocaleDateString(),
                status: 'Pending',
                upi: upi
            });

            userRef.update({ coins: 0 });
            alert("Request bhej di gayi hai!");
        }

        function renderHistory(obj) {
            const list = document.getElementById('history-list');
            const arr = Object.values(obj);
            list.innerHTML = arr.reverse().map(i => `<div>${i.date} - ₹${i.amount} (${i.status})</div>`).join('');
        }
    </script>
</body>
</html>
