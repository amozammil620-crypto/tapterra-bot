<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        .score { font-size: 40px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        
        /* Energy Bottle Style */
        .energy-container { width: 80%; background: #333; height: 25px; border-radius: 15px; margin: 20px auto; overflow: hidden; border: 2px solid #555; }
        #energy-bar { width: 100%; height: 100%; background: linear-gradient(to right, #00f2fe, #4facfe); transition: width 0.3s; }
        
        #coin { width: 200px; height: 200px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; border: 8px solid #daa520; margin: 30px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        #coin:active { transform: scale(0.95); }
        
        .btn { display: none; background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #timer-text { display: none; font-size: 20px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="score">💰 <span id="coins">0</span></div>
    
    <div class="energy-container">
        <div id="energy-bar"></div>
    </div>
    <div id="energy-text">Energy: 10/10</div>

    <div id="coin" onclick="handleTap(event)">TAP</div>

    <button id="recharge-btn" class="btn" onclick="startRecharge()">⚡ Charge Energy</button>
    <div id="timer-text">Refilling: <span id="seconds">20</span>s</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVfY7eeafTsMuNqGEnf-_-dIeACif3yRI",
            authDomain: "tapsterratry-ec73f.firebaseapp.com",
            databaseURL: "https://tapsterratry-ec73f-default-rtdb.firebaseio.com",
            projectId: "tapsterratry-ec73f",
            storageBucket: "tapsterratry-ec73f.firebasestorage.app",
            messagingSenderId: "845980784275",
            appId: "1:845980784275:web:7b50d4264927333a505f66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "dev_user";
        const userRef = db.ref('players/' + userId);

        let coins = 0;
        let energy = 10;
        let isRecharging = false;

        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                coins = data.coins || 0;
                energy = data.energy !== undefined ? data.energy : 10;
                document.getElementById('coins').innerText = coins;
                
                // Check Recharge Status
                if (data.rechargeFinishTime) {
                    const now = Date.now();
                    if (now < data.rechargeFinishTime) {
                        showTimer(data.rechargeFinishTime);
                    } else if (energy === 0) {
                        // Time khatam par energy abhi bhi 0 hai (Auto-fill)
                        finishRecharge();
                    }
                }
                updateUI();
            }
        });

        function handleTap(e) {
            if (energy > 0 && !isRecharging) {
                coins += 5;
                energy -= 1;
                userRef.update({ coins: coins, energy: energy });
            } else if (energy === 0 && !isRecharging) {
                alert("Energy khatam! Recharge karo.");
            }
        }

        function updateUI() {
            document.getElementById('energy-bar').style.width = (energy * 10) + "%";
            document.getElementById('energy-text').innerText = `Energy: ${energy}/10`;
            
            const coinBtn = document.getElementById('coin');
            const rechargeBtn = document.getElementById('recharge-btn');

            if (energy === 0 && !isRecharging) {
                coinBtn.style.display = "none";
                rechargeBtn.style.display = "inline-block";
            } else if (isRecharging) {
                coinBtn.style.display = "none";
                rechargeBtn.style.display = "none";
            } else {
                coinBtn.style.display = "flex";
                rechargeBtn.style.display = "none";
            }
        }

        function startRecharge() {
            const finishTime = Date.now() + 20000; // 20 sec from now
            userRef.update({ rechargeFinishTime: finishTime });
        }

        function showTimer(finishTime) {
            isRecharging = true;
            document.getElementById('timer-text').style.display = "block";
            
            const interval = setInterval(() => {
                const now = Date.now();
                const timeLeft = Math.ceil((finishTime - now) / 1000);

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    finishRecharge();
                } else {
                    document.getElementById('seconds').innerText = timeLeft;
                }
            }, 1000);
        }

        function finishRecharge() {
            isRecharging = false;
            document.getElementById('timer-text').style.display = "none";
            userRef.update({ energy: 10, rechargeFinishTime: null });
        }
    </script>
</body>
</html>
